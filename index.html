<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบยืม-คืน iPad</title>
    
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    
    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #f0f2f5; margin: 0; min-height: 100vh; display: flex; justify-content: center; align-items: center; }
        
        /* --- สไตล์ของหน้าจอ ล็อกอิน --- */
        .login-card { background: white; padding: 40px; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); width: 100%; max-width: 400px; text-align: center; }
        h2 { margin-top: 0; margin-bottom: 28px; color: #1a1a1a; font-size: 24px; }
        .input-group { margin-bottom: 18px; text-align: left; }
        label { display: block; margin-bottom: 8px; color: #555; font-size: 14px; font-weight: 600; }
        input { width: 100%; padding: 12px 16px; border: 1px solid #ccd0d5; border-radius: 8px; font-size: 16px; outline: none; transition: 0.2s; }
        input:focus { border-color: #007bff; box-shadow: 0 0 0 3px rgba(0,123,255,0.15); }
        .btn-submit { width: 100%; padding: 14px; background-color: #007bff; color: white; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; font-weight: bold; margin-top: 10px; transition: 0.2s; }
        .btn-submit:hover { background-color: #0056b3; }
        .divider { margin: 24px 0; color: #8d949e; font-size: 14px; display: flex; align-items: center; }
        .divider::before, .divider::after { content: ""; flex: 1; height: 1px; background: #ebedf0; margin: 0 12px; }
        .btn-line { width: 100%; padding: 14px; background-color: #06C755; color: white; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; font-weight: bold; display: flex; align-items: center; justify-content: center; gap: 10px; transition: 0.2s; }
        .btn-line:hover { background-color: #05b04b; }
        .line-icon { width: 20px; height: 20px; fill: white; }

        /* --- สไตล์ของหน้าจอหลัก ยืม-คืน (หลังล็อกอินสำเร็จ) --- */
        .dashboard-card { background: white; padding: 30px; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); width: 100%; max-width: 600px; display: none; }
        .user-profile { display: flex; align-items: center; gap: 15px; background: #f8f9fa; padding: 15px; border-radius: 12px; margin-bottom: 25px; }
        .profile-img { width: 60px; height: 60px; border-radius: 50%; border: 2px solid #06C755; }
        .user-details { text-align: left; }
        .user-name { font-weight: bold; font-size: 18px; color: #333; }
        .user-id { font-size: 12px; color: #777; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 250px; }
        .btn-logout { background: #dc3545; color: white; border: none; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: bold; margin-left: auto; }
        
        .ipad-list { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; text-align: left; }
        @media (max-width: 480px) { .ipad-list { grid-template-columns: 1fr; } }
        .ipad-item { border: 1px solid #e0e0e0; padding: 15px; border-radius: 10px; position: relative; }
        .status-badge { position: absolute; top: 15px; right: 15px; padding: 4px 8px; border-radius: 6px; font-size: 12px; font-weight: bold; }
        .status-available { background: #e6f4ea; color: #137333; }
        .status-borrowed { background: #fce8e6; color: #c5221f; }
        .btn-action { width: 100%; padding: 10px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; margin-top: 15px; }
        .btn-borrow { background: #28a745; color: white; }
        .btn-return { background: #ffc107; color: #333; }
    </style>
</head>
<body>

<div class="login-card" id="login-page">
    <h2>ระบบยืม-คืน iPad</h2>
    
    <form id="loginForm" onsubmit="handleNormalLogin(event)">
        <div class="input-group">
            <label for="username">ชื่อผู้ใช้งาน (Username)</label>
            <input type="text" id="username" placeholder="ใส่ชื่อผู้ใช้งาน" required>
        </div>
        <div class="input-group">
            <label for="password">รหัสผ่าน (Password)</label>
            <input type="password" id="password" placeholder="ใส่รหัสผ่าน" required>
        </div>
        <button type="submit" class="btn-submit">เข้าสู่ระบบ</button>
    </form>

    <div class="divider">หรือ</div>

    <button class="btn-line" onclick="handleLineLogin()">
        <svg class="line-icon" viewBox="0 0 24 24"><path d="M24 10.304c0-5.131-5.383-9.304-12-9.304s-12 4.173-12 9.304c0 4.594 4.305 8.435 10.119 9.18 0.394 0.085 0.932 0.261 1.066 0.6l0.383 1.644c0.116 0.501 0.45 0.434 0.45 0.434s0.413-0.279 0.443-0.453c0.068-0.39 0.438-2.519 0.438-2.519 1.226-0.12 2.39-0.443 3.447-0.954 3.013-1.455 5.654-4.52 5.654-8.936zm-15.54 2.871h-1.96c-0.329 0-0.596-0.268-0.596-0.597v-4.57c0-0.329 0.268-0.596 0.596-0.596s0.596 0.268 0.596 0.596v3.974h1.364c0.33 0 0.597 0.268 0.597 0.597 0 0.328-0.267 0.596-0.597 0.596zm3.398-0.597c0 0.329-0.268 0.597-0.597 0.597s-0.268-0.268-0.596-0.597v-4.57c0-0.329 0.268-0.596 0.596-0.596s0.597 0.268 0.597 0.596v4.57zm5.228 0c0 0.161-0.064 0.315-0.178 0.428-0.113 0.113-0.268 0.169-0.419 0.169h-1.96c-0.329 0-0.596-0.268-0.596-0.597v-4.57c0-0.329 0.268-0.596 0.596-0.596s0.596 0.268 0.596 0.596v3.974h1.364c0.33 0 0.597 0.268 0.597 0.597zm3.328-1.558c0 0.329-0.268 0.596-0.597 0.596h-1.364v1.01h1.364c0.33 0 0.597 0.268 0.597 0.597s-0.268 0.597-0.597 0.597h-1.961c-0.329 0-0.596-0.268-0.596-0.597v-4.57c0-0.329 0.268-0.596 0.596-0.596h1.961c0.33 0 0.597 0.268 0.597 0.596s-0.268 0.597-0.597 0.597h-1.364v0.965h1.364c0.33 0 0.597 0.268 0.597 0.596z"/></svg>
        เข้าสู่ระบบด้วย LINE
    </button>
</div>

<div class="dashboard-card" id="dashboard-page">
    <div class="user-profile">
        <img id="u-img" class="profile-img" src="https://via.placeholder.com/60" alt="User Image">
        <div class="user-details">
            <div class="user-name" id="u-name">ผู้ใช้งานทั่วไป</div>
            <div class="user-id" id="u-id">LINE ID: -</div>
        </div>
        <button class="btn-logout" onclick="handleLogout()">ออกจากระบบ</button>
    </div>

    <h3>รายการ iPad ในระบบ</h3>
    
    <div class="ipad-list">
        <div class="ipad-item">
            <strong>iPad Air 5 (เครื่องที่ 1)</strong>
            <div class="status-badge status-available">ว่าง</div>
            <button class="btn-action btn-borrow" onclick="borrowItem('เครื่องที่ 1')">กดคลิกยืม</button>
        </div>
        <div class="ipad-item">
            <strong>iPad Pro (เครื่องที่ 2)</strong>
            <div class="status-badge status-borrowed">ถูกยืมแล้ว</div>
            <button class="btn-action btn-return" onclick="returnItem('เครื่องที่ 2')">กดคลิกคืน</button>
        </div>
    </div>
</div>

<script>
// บันทึก LIFF ID ของคุณเรียบร้อยแล้ว
    const MY_LIFF_ID = '2010483649-bCj50Jvy'; 

    // 1. ตรวจสอบสถานะการล็อกอินตอน加โหลดหน้าเว็บ
    async function initLineApp() {
        try {
            // สั่งโหลด LIFF SDK
            await liff.init({ liffId: MY_LIFF_ID });
            
            // เช็กว่าล็อกอินหรือยัง
            if (liff.isLoggedIn()) {
                // ถ้าล็อกอินแล้ว ค่อยไปดึงโปรไฟล์
                const profile = await liff.getProfile();
                showDashboard(profile.displayName, profile.pictureUrl, profile.userId);
            } else {
                // ถ้ายังไม่ได้ล็อกอิน ให้ระบบสแตนด์บายหน้า Login ไว้เฉยๆ ไม่ต้องทำอะไร
                console.log("LIFF Ready, waiting for login...");
            }
        } catch (error) {
            console.error('LIFF Error:', error);
        }
    }

    // 2. ฟังก์ชันเมื่อกดเข้าสู่ระบบด้วย LINE (แก้ไขให้เรียกทำงานตรงๆ)
    function handleLineLogin() {
        try {
            if (!liff.isLoggedIn()) {
                liff.login(); // ตัวนี้จะเด้งไปหน้าล็อกอินของ LINE ทันที
            } else {
                initLineApp();
            }
        } catch (err) {
            alert("เกิดข้อผิดพลาดในการเชื่อมต่อ LINE: " + err.message);
        }
    }

    // 3. ฟังก์ชันล็อกอินแบบปกติ (Username / Password)
    function handleNormalLogin(event) {
        event.preventDefault();
        const user = document.getElementById('username').value;
        const pass = document.getElementById('password').value;
        
        if (user === 'admin' && pass === '1234') {
            showDashboard('Admin (ระบบทั่วไป)', 'https://cdn-icons-png.flaticon.com/512/3135/3135715.png', 'ไม่ได้ใช้ LINE');
        } else {
            alert('Username หรือ Password ไม่ถูกต้อง!');
        }
    }

    // 4. ฟังก์ชันสำหรับสลับหน้าจอ
    function showDashboard(name, imgUrl, userId) {
        document.getElementById('login-page').style.display = 'none';
        document.getElementById('dashboard-page').style.display = 'block';
        
        document.getElementById('u-name').innerText = name;
        document.getElementById('u-img').src = imgUrl || 'https://via.placeholder.com/60';
        document.getElementById('u-id').innerText = 'ID: ' + userId;
    }

    // 5. ฟังก์ชันออกจากระบบ
    function handleLogout() {
        if (liff.isLoggedIn()) {
            liff.logout(); 
        }
        window.location.reload(); 
    }

    function borrowItem(itemName) {
        alert('คุณกำลังทำรายการยืม: ' + itemName);
    }
    function returnItem(itemName) {
        alert('คุณกำลังทำรายการคืน: ' + itemName);
    }

    // รันตอนเปิดหน้าจอ
    initLineApp();
</script>

</body>
</html>
