<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบยืม-คืน iPad - ล็อกอิน</title>
    
    <!-- 1. ดึง LINE SDK มาใช้งาน (ห้ามลบ) -->
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    
    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-card { background: white; padding: 40px; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); width: 100%; max-width: 400px; text-align: center; }
        h2 { margin-bottom: 28px; color: #1a1a1a; font-size: 24px; }
        .input-group { margin-bottom: 18px; text-align: left; }
        label { display: block; margin-bottom: 8px; color: #555; font-size: 14px; font-weight: 600; }
        input { width: 100%; padding: 12px 16px; border: 1px solid #ccd0d5; border-radius: 8px; font-size: 16px; outline: none; transition: 0.2s; }
        input:focus { border-color: #007bff; box-shadow: 0 0 0 3px rgba(0,123,255,0.15); }
        .btn-submit { width: 100%; padding: 14px; background-color: #007bff; color: white; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; font-weight: bold; margin-top: 10px; transition: 0.2s; }
        .btn-submit:hover { background-color: #0056b3; }
        .divider { margin: 24px 0; color: #8d949e; font-size: 14px; display: flex; align-items: center; }
        .divider::before, .divider::after { content: ""; flex: 1; height: 1px; background: #ebedf0; margin: 0 12px; }
        .btn-line { width: 100%; padding: 14px; background-color: #06C755; color: white; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; font-weight: bold; display: flex; align-items: center; justify-content: center; gap: 10px; transition: 0.2s; }
        .btn-line:hover { background-color: #05b04b; }
        .line-icon { width: 20px; height: 20px; fill: white; }
    </style>
</head>
<body>

<div class="login-card">
    <h2>ระบบยืม-คืน iPad</h2>
    
    <!-- ฟอร์มล็อกอินแบบปกติ (Username / Password) -->
    <form id="loginForm" onsubmit="handleNormalLogin(event)">
        <div class="input-group">
            <label for="username">ชื่อผู้ใช้งาน (Username)</label>
            <input type="text" id="username" placeholder="ใส่ชื่อผู้ใช้งาน" required>
        </div>
        <div class="input-group">
            <label for="password">รหัสผ่าน (Password)</label>
            <input type="password" id="password" placeholder="ใส่รหัสผ่าน" required>
        </div>
        <button type="submit" class="btn-submit">เข้าสู่ระบบ</button>
    </form>

    <div class="divider">หรือ</div>

    <!-- ปุ่มล็อกอินด้วย LINE -->
    <button class="btn-line" onclick="handleLineLogin()">
        <!-- ไอคอน LINE แบบ SVG -->
        <svg class="line-icon" viewBox="0 0 24 24"><path d="M24 10.304c0-5.131-5.383-9.304-12-9.304s-12 4.173-12 9.304c0 4.594 4.305 8.435 10.119 9.18 0.394 0.085 0.932 0.261 1.066 0.6l0.383 1.644c0.116 0.501 0.45 0.434 0.45 0.434s0.413-0.279 0.443-0.453c0.068-0.39 0.438-2.519 0.438-2.519 1.226-0.12 2.39-0.443 3.447-0.954 3.013-1.455 5.654-4.52 5.654-8.936zm-15.54 2.871h-1.96c-0.329 0-0.596-0.268-0.596-0.597v-4.57c0-0.329 0.268-0.596 0.596-0.596s0.596 0.268 0.596 0.596v3.974h1.364c0.33 0 0.597 0.268 0.597 0.597 0 0.328-0.267 0.596-0.597 0.596zm3.398-0.597c0 0.329-0.268 0.597-0.597 0.597s-0.596-0.268-0.596-0.597v-4.57c0-0.329 0.268-0.596 0.596-0.596s0.597 0.268 0.597 0.596v4.57zm5.228 0c0 0.161-0.064 0.315-0.178 0.428-0.113 0.113-0.268 0.169-0.419 0.169h-1.96c-0.329 0-0.596-0.268-0.596-0.597v-4.57c0-0.329 0.268-0.596 0.596-0.596s0.596 0.268 0.596 0.596v3.974h1.364c0.33 0 0.597 0.268 0.597 0.597zm3.328-1.558c0 0.329-0.268 0.596-0.597 0.596h-1.364v1.01h1.364c0.33 0 0.597 0.268 0.597 0.597s-0.268 0.597-0.597 0.597h-1.961c-0.329 0-0.596-0.268-0.596-0.597v-4.57c0-0.329 0.268-0.596 0.596-0.596h1.961c0.33 0 0.597 0.268 0.597 0.596s-0.268 0.597-0.597 0.597h-1.364v0.965h1.364c0.33 0 0.597 0.268 0.597 0.596z"/></svg>
        เข้าสู่ระบบด้วย LINE
    </button>
</div>

<script>
    // ⚠️ สำคัญมาก: เปลี่ยนคำว่างตรงนี้เป็น LIFF ID ของคุณที่ก๊อปมาจาก LINE Developers
    const MY_LIFF_ID = '2010483649-bCj50Jvy'; 

    // ฟังก์ชันเริ่มการทำงานของ LINE LIFF
    async function initLineApp() {
        try {
            await liff.init({ liffId: MY_LIFF_ID });
            
            // เช็กว่าผู้ใช้ล็อกอินค้างไว้ หรือเพิ่งกดยอมรับสิทธิ์ล็อกอินเข้ามาไหม
            if (liff.isLoggedIn()) {
                const profile = await liff.getProfile();
                
                // จำลองว่าล็อกอินผ่าน LINE สำเร็จ (จะแสดงชื่อผู้ใช้จาก LINE)
                alert('ล็อกอินผ่าน LINE สำเร็จ! ยินดีต้อนรับคุณ: ' + profile.displayName);
                
                // พักตรงนี้ไว้ก่อน (เดี๋ยวขั้นตอนถัดไปจะพาทำหน้าดึงประวัติ/หน้ายืมคืน)
            }
        } catch (error) {
            console.error('LIFF Error:', error);
        }
    }

    // เมื่อกดปุ่ม LINE Login
    function handleLineLogin() {
        if (!liff.isLoggedIn()) {
            liff.login(); // คำสั่งของ LINE เพื่อเด้งไปหน้าจอขอสิทธิ์ล็อกอิน
        }
    }

    // เมื่อกดปุ่มล็อกอินแบบปกติ (Username/Password)
    function handleNormalLogin(event) {
        event.preventDefault(); // กันไม่ให้หน้าเว็บรีเฟรชเอง
        const user = document.getElementById('username').value;
        const pass = document.getElementById('password').value;
        
        // ทดสอบล็อกอินแบบง่ายๆ ก่อน (เดี๋ยวค่อยเชื่อมฐานข้อมูลจริงในอนาคต)
        if (user === 'admin' && pass === '1234') {
            alert('ล็อกอินระบบทั่วไปสำเร็จ! ยินดีต้อนรับ Admin');
        } else {
            alert('Username หรือ Password ไม่ถูกต้อง!');
        }
    }

    // รันฟังก์ชันเพื่อเตรียมระบบ LINE ทันทีที่เปิดหน้าเว็บ
    initLineApp();
</script>

</body>
</html>
