<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบยืม-คืน iPad</title>
    
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    
    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        /* เปลี่ยนพื้นหลังเป็นสีฟ้าอ่อนพาสเทล ดูสบายตา */
        body { background-color: #f0v7f9; background: linear-gradient(135deg, #e0f2fe 0%, #e8f5e9 100%); margin: 0; min-height: 100vh; display: flex; justify-content: center; align-items: center; }
        
        /* --- สไตล์ของหน้าจอ ล็อกอิน --- */
        .login-card { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0, 123, 255, 0.05); width: 100%; max-width: 400px; text-align: center; border: 1px solid rgba(255, 255, 255, 0.8); }
        h2 { margin-top: 0; margin-bottom: 8px; color: #0f172a; font-size: 26px; font-weight: 700; }
        .subtitle { color: #64748b; font-size: 14px; margin-bottom: 32px; }
        .input-group { margin-bottom: 20px; text-align: left; }
        label { display: block; margin-bottom: 8px; color: #334155; font-size: 14px; font-weight: 600; }
        
        /* อินพุตขอบมน ธีมฟ้า */
        input { width: 100%; padding: 12px 16px; border: 1.5px solid #cbd5e1; border-radius: 12px; font-size: 16px; outline: none; transition: 0.2s; background-color: #f8fafc; }
        input:focus { border-color: #0ea5e9; background-color: #fff; box-shadow: 0 0 0 4px rgba(14, 165, 233, 0.15); }
        
        /* ปุ่มส่งข้อมูล สีฟ้าสดใส */
        .btn-submit { width: 100%; padding: 14px; background-color: #0ea5e9; color: white; border: none; border-radius: 12px; font-size: 16px; cursor: pointer; font-weight: bold; margin-top: 10px; transition: 0.2s; box-shadow: 0 4px 12px rgba(14, 165, 233, 0.2); }
        .btn-submit:hover { background-color: #0284c7; transform: translateY(-1px); }
        
        .divider { margin: 24px 0; color: #94a3b8; font-size: 14px; display: flex; align-items: center; }
        .divider::before, .divider::after { content: ""; flex: 1; height: 1px; background: #e2e8f0; margin: 0 12px; }
        
        /* ปุ่ม LINE สีเขียวมิ้นท์/แบรนด์ดั้งเดิม เพื่อความคุ้นชิน แต่ปรับให้เข้ากับธีม */
        .btn-line { width: 100%; padding: 14px; background-color: #06C755; color: white; border: none; border-radius: 12px; font-size: 16px; cursor: pointer; font-weight: bold; display: flex; align-items: center; justify-content: center; gap: 10px; transition: 0.2s; box-shadow: 0 4px 12px rgba(6, 199, 85, 0.2); }
        .btn-line:hover { background-color: #05b04b; transform: translateY(-1px); }
        .line-icon { width: 20px; height: 20px; fill: white; }

        /* --- สไตล์ของหน้าจอหลัก ยืม-คืน (หลังล็อกอินสำเร็จ) --- */
        .dashboard-card { background: white; padding: 35px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.04); width: 100%; max-width: 600px; display: none; border: 1px solid rgba(255, 255, 255, 0.8); }
        
        /* โปรไฟล์ผู้ใช้สไตล์มินิมอล ฟ้า-เขียว */
        .user-profile { display: flex; align-items: center; gap: 15px; background: linear-gradient(135deg, #f0f9ff 0%, #f0fdf4 100%); padding: 16px; border-radius: 16px; margin-bottom: 30px; border: 1px solid #e2e8f0; }
        .profile-img { width: 60px; height: 60px; border-radius: 50%; border: 3px solid #0ea5e9; }
        .user-details { text-align: left; }
        .user-name { font-weight: 700; font-size: 18px; color: #1e293b; }
        .user-id { font-size: 12px; color: #64748b; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 250px; margin-top: 2px; }
        .btn-logout { background: #ef4444; color: white; border: none; padding: 8px 14px; border-radius: 8px; cursor: pointer; font-size: 12px; font-weight: bold; margin-left: auto; transition: 0.2s; }
        .btn-logout:hover { background: #dc2626; }
        
        h3 { color: #1e293b; margin-bottom: 20px; font-size: 20px; text-align: left; }
        .ipad-list { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; text-align: left; }
        @media (max-width: 480px) { .ipad-list { grid-template-columns: 1fr; } }
        
        /* การ์ดรายการอุปกรณ์ */
        .ipad-item { border: 1px solid #e2e8f0; padding: 20px; border-radius: 16px; position: relative; background-color: #fff; transition: 0.2s; }
        .ipad-item:hover { transform: translateY(-2px); box-shadow: 0 6px 16px rgba(0,0,0,0.03); }
        .ipad-title { color: #334155; font-size: 16px; font-weight: 600; display: block; margin-bottom: 4px; }
        
        /* Badge สถานะ ฟ้า-เขียว */
        .status-badge { position: absolute; top: 20px; right: 20px; padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: 700; }
        .status-available { background: #dcfce7; color: #15803d; }
        .status-borrowed { background: #fee2e2; color: #b91c1c; }
        
        .btn-action { width: 100%; padding: 12px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 20px; transition: 0.2s; font-size: 14px; }
        /* ปุ่มยืมสีเขียวมิ้นท์ ขับธีมสะอาดตา */
        .btn-borrow { background: #10b981; color: white; box-shadow: 0 4px 10px rgba(16, 185, 129, 0.2); }
        .btn-borrow:hover { background: #059669; }
        /* ปุ่มคืนสีฟ้าคราม */
        .btn-return { background: #0284c7; color: white; box-shadow: 0 4px 10px rgba(2, 132, 199, 0.2); }
        .btn-return:hover { background: #0369a1; }
    </style>
</head>
<body>

<div class="login-card" id="login-page">
    <h2>ระบบยืม-คืน iPad</h2>
    <div class="subtitle">กรุณาเลือกช่องทางเข้าสู่ระบบด้านล่าง</div>
    
    <form id="loginForm" onsubmit="handleNormalLogin(event)">
        <div class="input-group">
            <label for="username">ชื่อผู้ใช้งาน (Username)</label>
            <input type="text" id="username" placeholder="ใส่ชื่อผู้ใช้งาน" required>
        </div>
        <div class="input-group">
            <label for="password">รหัสผ่าน (Password)</label>
            <input type="password" id="password" placeholder="ใส่รหัสผ่าน" required>
        </div>
        <button type="submit" class="btn-submit">เข้าสู่ระบบ</button>
    </form>

    <div class="divider">หรือ</div>

    <button class="btn-line" onclick="handleLineLogin()">
        <svg class="line-icon" viewBox="0 0 24 24"><path d="M24 10.304c0-5.131-5.383-9.304-12-9.304s-12 4.173-12 9.304c0 4.594 4.305 8.435 10.119 9.18 0.394 0.085 0.932 0.261 1.066 0.6l0.383 1.644c0.116 0.501 0.45 0.434 0.45 0.434s0.413-0.279 0.443-0.453c0.068-0.39 0.438-2.519 0.438-2.519 1.226-0.12 2.39-0.443 3.447-0.954 3.013-1.455 5.654-4.52 5.654-8.936zm-15.54 2.871h-1.96c-0.329 0-0.596-0.268-0.596-0.597v-4.57c0-0.329 0.268-0.596 0.596-0.596s0.596 0.268 0.596 0.596v3.974h1.364c0.33 0 0.597 0.268 0.597 0.597 0 0.328-0.267 0.596-0.597 0.596zm3.398-0.597c0 0.329-0.268 0.597-0.597 0.597s-0.268-0.268-0.596-0.597v-4.57c0-0.329 0.268-0.596 0.596-0.596s0.597 0.268 0.597 0.596v4.57zm5.228 0c0 0.161-0.064 0.315-0.178 0.428-0.113 0.113-0.268 0.169-0.419 0.169h-1.96c-0.329 0-0.596-0.268-0.596-0.597v-4.57c0-0.329 0.268-0.596 0.596-0.596s0.596 0.268 0.596 0.596v3.974h1.364c0.33 0 0.597 0.268 0.597 0.597zm3.328-1.558c0 0.329-0.268 0.596-0.597 0.596h-1.364v1.01h1.364c0.33 0 0.597 0.268 0.597 0.597s-0.268 0.597-0.597 0.597h-1.961c-0.329 0-0.596-0.268-0.596-0.597v-4.57c0-0.329 0.268-0.596 0.596-0.596h1.961c0.33 0 0.597 0.268 0.597 0.596s-0.268 0.597-0.597 0.597h-1.364v0.965h1.364c0.33 0 0.597 0.268 0.597 0.596z"/></svg>
        เข้าสู่ระบบด้วย LINE
    </button>
</div>

<div class="dashboard-card" id="dashboard-page">
    <div class="user-profile">
        <img id="u-img" class="profile-img" src="https://via.placeholder.com/60" alt="User Image">
        <div class="user-details">
            <div class="user-name" id="u-name">ผู้ใช้งานทั่วไป</div>
            <div class="user-id" id="u-id">LINE ID: -</div>
        </div>
        <button class="btn-logout" onclick="handleLogout()">ออกจากระบบ</button>
    </div>

    <h3>รายการ iPad ในระบบ</h3>
    
    <div class="ipad-list">
        <div class="ipad-item">
            <span class="ipad-title">iPad Air 5 (เครื่องที่ 1)</span>
            <div class="status-badge status-available">ว่าง</div>
            <button class="btn-action btn-borrow" onclick="borrowItem('เครื่องที่ 1')">กดคลิกยืม</button>
        </div>
        <div class="ipad-item">
            <span class="ipad-title">iPad Pro (เครื่องที่ 2)</span>
            <div class="status-badge status-borrowed">ถูกยืมแล้ว</div>
            <button class="btn-action btn-return" onclick="returnItem('เครื่องที่ 2')">กดคลิกคืน</button>
        </div>
    </div>
</div>

<script>
    // รหัส LIFF ID ตัวใหม่ล่าสุดของคุณ
    const MY_LIFF_ID = '2010484951-KHRdqAgy'; 

    // ฟังก์ชันเริ่มระบบและตรวจสอบประวัติ LINE
    async function startLiff() {
        try {
            await liff.init({ liffId: MY_LIFF_ID });
            if (liff.isLoggedIn()) {
                const profile = await liff.getProfile();
                showDashboard(profile.displayName, profile.pictureUrl, profile.userId);
            }
        } catch (error) {
            console.error('เกิดข้อผิดพลาดในการเปิดระบบ LINE:', error);
        }
    }

    // ฟังก์ชันเมื่อกดปุ่มล็อกอินผ่าน LINE
    function handleLineLogin() {
        if (!liff.isLoggedIn()) {
            liff.login(); 
        }
    }

    // ฟังก์ชันล็อกอินแบบปกติ (Username / Password)
    function handleNormalLogin(event) {
        event.preventDefault();
        const user = document.getElementById('username').value;
        const pass = document.getElementById('password').value;
        
        if (user === 'admin' && pass === '1234') {
            showDashboard('Admin (ระบบทั่วไป)', 'https://cdn-icons-png.flaticon.com/512/3135/3135715.png', 'ไม่ได้ใช้งานผ่าน LINE');
        } else {
            alert('Username หรือ Password ไม่ถูกต้อง!');
        }
    }

    // ฟังก์ชันสำหรับสลับหน้าจอไปที่หน้าแสดงรายการ iPad
    function showDashboard(name, imgUrl, userId) {
        document.getElementById('login-page').style.display = 'none';
        document.getElementById('dashboard-page').style.display = 'block';
        
        document.getElementById('u-name').innerText = name;
        document.getElementById('u-img').src = imgUrl || 'https://via.placeholder.com/60';
        document.getElementById('u-id').innerText = 'ID: ' + userId;
    }

    // ฟังก์ชันออกจากระบบ
    function handleLogout() {
        if (liff.isLoggedIn()) {
            liff.logout();
        }
        window.location.reload(); 
    }

    function borrowItem(itemName) { alert('คุณกำลังทำรายการยืม: ' + itemName); }
    function returnItem(itemName) { alert('คุณกำลังทำรายการคืน: ' + itemName); }

    // เรียกทำงานทันทีที่เปิดเว็บ
    startLiff();
</script>

</body>
</html>
